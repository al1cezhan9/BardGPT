<!DOCTYPE html>
<html>
<head>
    <title>Pay Attention!</title>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #ddd; padding: 2rem; }
        #container { line-height: 1.6; font-size: 18px; border: 1px solid #444; padding: 20px; }
        .tok { cursor: pointer; transition: background 0.1s; border-radius: 2px; }
        .tok:hover { outline: 1px solid #b4d4ff; }
        #prompt-input { width: 80%; padding: 10px; background: #333; color: white; border: none; }
    </style>
</head>
<body>
    <h1>BardGPT</h1>
    <body>Render's free tier has no GPU support :/ hence generation speed is suboptimal. To any impatient souls, I suggest you clone the repo locally!</body>
    <br><br>
    <div class="controls">
        <label>Tokens:</label>
        <input type="number" id="token-count" value="100" min="1" max="1000">

        <label>Temperature:</label>
        <input type="range" id="temp-slider" min="0.1" max="2.0" step="0.1" value="0.8">
        
        <span id="temp-value" style="font-weight: bold; color: #ffffff;">0.8</span>

        <button onclick="generate()">Generate</button>
    </div>
    <h3>Hover over tokens to visualize what they are paying attention to!</h3>
    
    
    
    <input type="text" id="prompt-input" value="ROMEO: ">
    
    <div id="container" onmouseleave="clearAttn()"></div>

    <script>
        const container = document.getElementById('container');
        
        async function generate() {
            const btn = document.querySelector('button');
            
            // Safety check: prevent double-clicks if it's already running
            if (btn.disabled) return; 

            const prompt = document.getElementById('prompt-input').value;
            const length = document.getElementById('token-count').value;
            const temp = document.getElementById('temp-slider').value;
            
            const container = document.getElementById('container');
            container.innerHTML = ''; 

            // Lock the button
            btn.disabled = true;
            btn.innerText = 'Generating...';
            
            try {
                const url = `http://localhost:8000/generate?prompt=${encodeURIComponent(prompt)}&length=${length}&temp=${temp}`;
                const response = await fetch(url);

                // Throw an error if the server responds with a 404, 500, etc.
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                let tokenIndex = 0; 
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); 

                    for (const line of lines) {
                        if (!line.trim()) continue;
                        const data = JSON.parse(line);
                        
                        const span = document.createElement('span');
                        span.className = 'tok';
                        span.id = `t-${tokenIndex}`;
                        span.innerText = data.text;
                        
                        const thisAttn = data.attn;
                        const currentTokenIndex = tokenIndex; 
                        span.onmouseover = () => showAttn(thisAttn, currentTokenIndex);
                        span.onmouseout = () => clearAttn();
                        
                        container.appendChild(span);
                        tokenIndex++; 
                    }
                }
            } catch (error) {
                // Handle any server or streaming errors gracefully
                console.error("Generation failed:", error);
                container.innerHTML += `<br><span style="color: #ff6b6b;">Error: Generation failed. Check console.</span>`;
            } finally {
                // The finally block executes NO MATTER WHAT, unlocking your button
                btn.disabled = false;
                btn.innerText = 'Generate';
            }
        }
        

        function showAttn(attnMatrix, targetTokenIndex) {
            const numHeads = attnMatrix.length;
            const seqLen = attnMatrix[0].length;
            
            // Calculate where the context window started
            const offset = Math.max(0, targetTokenIndex - seqLen); 

            const meanWeights = attnMatrix[0].map((_, i) => 
                attnMatrix.reduce((acc, head) => acc + head[i], 0) / numHeads
            );

            const maxWeight = Math.max(...meanWeights);

            meanWeights.forEach((weight, i) => {
                const absoluteIndex = offset + i; // Apply the offset!
                const prevTok = document.getElementById(`t-${absoluteIndex}`);
                
                if (prevTok) {
                    // The highest attended token always gets alpha = 1.0
                    const alpha = maxWeight > 0 ? (weight / maxWeight) : 0;
                    // absolute / no normalization, attention stronger when context window not saturated
                    // const alpha = Math.min(weight * 8, 1.0);
                    prevTok.style.backgroundColor = `rgba(194,195,255, ${alpha})`;
                    prevTok.style.color = alpha > 0.4 ? '#fff' : '#ddd';
                }
            });
        }
        function clearAttn() {
            // Select all tokens and strip background styles
            const tokens = document.querySelectorAll('.tok');
            for (let i = 0; i < tokens.length; i++) {
                tokens[i].style.backgroundColor = 'transparent';
                // reset color
                tokens[i].style.color = '#ddd'; 
            }
        }
        
        const tempSlider = document.getElementById('temp-slider');
        const tempValue = document.getElementById('temp-value');
        // listen for 'input' events (triggers while dragging)
        tempSlider.oninput = function() {
            // update the text to match the slider's current value
            tempValue.innerText = this.value;
        };
    </script>
</body>
</html>


<style>

    button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
        pointer-events: none; /* Prevents any mouse events */
    }
</style>
